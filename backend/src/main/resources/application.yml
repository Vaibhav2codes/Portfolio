server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:3000}

portfolio:
  contact:
    to-email: ${CONTACT_TO_EMAIL:vaibhav2112001@gmail.com}
    from-email: ${CONTACT_FROM_EMAIL:no-reply@portfolio.local}
  resume:
    admin-password: ${RESUME_ADMIN_PASSWORD:}
    max-file-size-bytes: ${RESUME_MAX_FILE_SIZE_BYTES:5242880}
    supabase-url: ${SUPABASE_URL:}
    supabase-service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    supabase-bucket: ${SUPABASE_BUCKET:portfolio-assets}
    supabase-object-path: ${SUPABASE_OBJECT_PATH:resume.pdf}

spring:
  servlet:
    multipart:
      max-file-size: ${RESUME_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${RESUME_MULTIPART_MAX_REQUEST_SIZE:5MB}
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
