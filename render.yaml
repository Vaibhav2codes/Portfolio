services:
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: RESUME_ADMIN_PASSWORD
        sync: false
      - key: RESUME_MAX_FILE_SIZE_BYTES
        value: "5242880"
      - key: RESUME_MULTIPART_MAX_FILE_SIZE
        value: 5MB
      - key: RESUME_MULTIPART_MAX_REQUEST_SIZE
        value: 5MB
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: portfolio-assets
      - key: SUPABASE_OBJECT_PATH
        value: resume.pdf
      - key: FRONTEND_URL
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_PROPERTIES_MAIL_SMTP_AUTH
        value: "true"
      - key: SMTP_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: "true"

  - type: web
    name: portfolio-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: BACKEND_INTERNAL_URL
        fromService:
          type: web
          name: portfolio-backend
          property: hostport
